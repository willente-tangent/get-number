<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忠县消防专职招录面试抽签</title>
    <style>
        :root {
            --primary-color: #FF6B6B; 
            --secondary-color: #4ECDC4; 
            --accent-color: #FFE66D; 
            --text-color: #2D3436; 
            --bg-color: #F7FFF7; 
            --panel-bg: #FFFFFF; 
            --shadow: 0 8px 0 rgba(0,0,0,0.1); 
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            background: var(--panel-bg);
            border: 4px solid var(--text-color);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            color: var(--primary-color);
            text-shadow: 2px 2px 0 var(--accent-color);
            margin: 0 0 5px 0;
        }
        
        h2 {
            font-size: 18px;
            color: #666;
            margin: 0 0 30px 0;
        }

        .display-area {
            background-color: #F9F9F9;
            border: 4px solid var(--text-color);
            border-radius: 16px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        #result {
            font-size: 100px;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 4px 4px 0 var(--text-color);
            transition: transform 0.1s;
        }

        .btn {
            font-family: inherit;
            font-size: 20px;
            font-weight: bold;
            color: var(--text-color);
            background-color: var(--secondary-color);
            border: 3px solid var(--text-color);
            border-radius: 50px;
            padding: 15px 40px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 5px 0 var(--text-color);
            margin-bottom: 10px;
            width: 100%;
        }

        .btn:hover { background-color: #65e2d9; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--text-color); }
        .btn:disabled {
            background-color: #eee;
            color: #aaa;
            border-color: #ccc;
            box-shadow: 0 5px 0 #ccc;
            cursor: not-allowed;
        }

        .pool-container { margin-top: 30px; width: 100%; }
        .pool-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            color: #999;
        }

        .pool-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .pool-item {
            background-color: white;
            border: 2px solid var(--text-color);
            border-radius: 10px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
        }

        .pool-item.used {
            background-color: #f0f0f0;
            color: #ccc;
            border-color: #ddd;
            text-decoration: line-through;
        }

        .reset-link {
            margin-top: 20px;
            font-size: 12px;
            color: #bbb;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>忠县消防专职招录</h1>
        <h2>面试抽签 (1-14号)</h2>

        <div class="display-area">
            <div id="result">?</div>
        </div>

        <button class="btn" id="drawBtn" onclick="startDraw()">✨ 点击开始抽签 ✨</button>
        
        <div class="pool-container">
            <div class="pool-title">号码池状态</div>
            <div class="pool-grid" id="poolGrid"></div>
        </div>

        <div class="reset-link" onclick="reset()">重新开始新一轮抽签</div>
    </div>

    <script>
        let numbers = Array.from({length: 14}, (_, i) => i + 1);
        let isRunning = false;

        function init() {
            const grid = document.getElementById('poolGrid');
            grid.innerHTML = '';
            for(let i=1; i<=14; i++) {
                const div = document.createElement('div');
                div.className = 'pool-item';
                div.id = 'item-' + i;
                div.innerText = i;
                grid.appendChild(div);
            }
        }

        function startDraw() {
            if (isRunning || numbers.length === 0) return;
            
            isRunning = true;
            const btn = document.getElementById('drawBtn');
            const res = document.getElementById('result');
            btn.disabled = true;

            // 滚动效果
            let count = 0;
            const interval = setInterval(() => {
                res.innerText = Math.floor(Math.random() * 14) + 1;
                count++;
                if (count > 15) {
                    clearInterval(interval);
                    finishDraw();
                }
            }, 50);
        }

        function finishDraw() {
            const res = document.getElementById('result');
            const btn = document.getElementById('drawBtn');
            
            // 真正随机抽取
            const idx = Math.floor(Math.random() * numbers.length);
            const lucky = numbers.splice(idx, 1)[0];

            res.innerText = lucky;
            res.style.color = "#4ECDC4"; // 抽中后变为薄荷绿
            
            // 标记已使用
            document.getElementById('item-' + lucky).className = 'pool-item used';

            isRunning = false;
            if (numbers.length > 0) {
                btn.disabled = false;
                btn.innerText = '抽取下一个';
            } else {
                btn.innerText = '抽签已完成';
            }
        }

        function reset() {
            if(confirm('确定要清空当前记录并重新开始吗？')) {
                numbers = Array.from({length: 14}, (_, i) => i + 1);
                document.getElementById('result').innerText = '?';
                document.getElementById('result').style.color = '#FF6B6B';
                document.getElementById('drawBtn').disabled = false;
                document.getElementById('drawBtn').innerText = '✨ 点击开始抽签 ✨';
                init();
            }
        }

        init();
    </script>
</body>
</html>
