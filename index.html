<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忠县消防专职招录面试抽签</title>
    <style>
        :root {
            /* 现代可爱配色 */
            --primary-color: #FF6B6B; /* 主色：柔和红 */
            --secondary-color: #4ECDC4; /* 辅助色：薄荷绿 */
            --accent-color: #FFE66D; /* 强调色：鹅黄 */
            --text-color: #2D3436; /* 文字色 */
            --bg-color: #F7FFF7; /* 背景色 */
            --panel-bg: #FFFFFF; /* 面板背景 */
            --shadow: 0 8px 0 rgba(0,0,0,0.1); /* 扁平化阴影 */
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 标题样式 */
        h1 {
            font-size: 32px;
            color: var(--primary-color);
            text-shadow: 2px 2px 0 var(--accent-color);
            margin-bottom: 5px;
            text-align: center;
        }
        
        h2 {
            font-size: 18px;
            color: #666;
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 主容器 */
        .main-container {
            background: var(--panel-bg);
            border: 4px solid var(--text-color);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        /* 数字显示区 */
        .display-area {
            background-color: #F0F0F0;
            border: 4px solid var(--text-color);
            border-radius: 16px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            position: relative;
        }

        .display-area::before {
            content: '编号';
            position: absolute;
            top: 5px;
            left: 10px;
            font-size: 14px;
            color: #999;
        }

        #result {
            font-size: 100px;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 4px 4px 0 var(--text-color);
        }

        /* 按钮样式 */
        .btn {
            font-family: inherit;
            font-size: 20px;
            font-weight: bold;
            color: var(--text-color);
            background-color: var(--secondary-color);
            border: 3px solid var(--text-color);
            border-radius: 50px;
            padding: 15px 40px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 5px 0 var(--text-color);
            margin: 10px;
        }

        .btn:hover {
            background-color: #65e2d9;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 var(--text-color);
        }

        .btn:disabled {
            background-color: #bdc3c7;
            color: #7f8c8d;
            border-color: #7f8c8d;
            box-shadow: 0 5px 0 #7f8c8d;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-reset {
            background-color: #fab1a0;
            font-size: 16px;
            padding: 10px 25px;
        }
        .btn-reset:hover {
            background-color: #ff9f87;
        }

        /* 号码池样式 */
        .pool-container {
            margin-top: 40px;
            width: 100%;
            max-width: 450px;
        }

        .pool-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pool-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .pool-item {
            background-color: white;
            border: 3px solid var(--text-color);
            border-radius: 12px;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .pool-item.active {
            color: white;
            background-color: var(--primary-color);
            border-color: var(--text-color);
            transform: scale(1.05);
        }

        .pool-item.used {
            background-color: #e0e0e0;
            color: #a0a0a0;
            border-color: #a0a0a0;
            text-decoration: line-through;
        }

    </style>
</head>
<body>

    <div class="main-container">
        <h1>忠县消防专职招录</h1>
        <h2>面试抽签 (1-14号)</h2>

        <div class="display-area">
            <span id="result">?</span>
        </div>

        <button class="btn" id="drawBtn" onclick="draw()">✨ 点击抽签 ✨</button>
        
        <div class="pool-container">
            <div class="pool-title">
                <span>剩余号码池</span>
                <button class="btn btn-reset" onclick="reset()">重置</button>
            </div>
            <div class="pool-grid" id="poolGrid">
                </div>
        </div>
    </div>

    <script>
        const totalNumbers = 14;
        let numbersPool = [];
        let usedNumbers = [];
        let isDrawing = false;

        // 初始化号码池
        function initPool() {
            numbersPool = Array.from({length: totalNumbers}, (_, i) => i + 1);
            usedNumbers = [];
            document.getElementById('result').innerText = '?';
            document.getElementById('result').style.color = 'var(--primary-color)';
            document.getElementById('drawBtn').disabled = false;
            document.getElementById('drawBtn').innerText = '✨ 点击抽签 ✨';
            
            const grid = document.getElementById('poolGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= totalNumbers; i++) {
                const item = document.createElement('div');
                item.className = 'pool-item';
                item.id = `num-${i}`;
                item.innerText = i;
                grid.appendChild(item);
            }
        }

        // 抽签函数
        function draw() {
            if (isDrawing || numbersPool.length === 0) return;
            
            isDrawing = true;
            const drawBtn = document.getElementById('drawBtn');
            const resultDisplay = document.getElementById('result');
            drawBtn.disabled = true;
            drawBtn.innerText = '正在抽签...';

            // 1. 简单的随机滚动动画
            let animationTimer;
            let counter = 0;
            animationTimer = setInterval(() => {
                const randomVisual = Math.floor(Math.random() * totalNumbers) + 1;
                resultDisplay.innerText = randomVisual;
                counter++;
                
                // 2. 动画结束，输出真实结果
                if (counter > 15) { 
                    clearInterval(animationTimer);
                    finalizeDraw();
                }
            }, 60);
        }

        function finalizeDraw() {
            const drawBtn = document.getElementById('drawBtn');
            const resultDisplay = document.getElementById('result');
            
            // 随机选择一个索引
            const randomIndex = Math.floor(Math.random() * numbersPool.length);
            // 从池中移除并获取该号码
            const luckyNumber = numbersPool.splice(randomIndex, 1)[0];
            usedNumbers.push(luckyNumber);

            // 更新显示
            resultDisplay.innerText = luckyNumber;
            resultDisplay.style.color = var(--secondary-color); // 抽中后变色

            // 更新号码池状态
            document.getElementById(`num-${luckyNumber}`).classList.add('used');

            isDrawing = false;
            
            // 检查是否抽完
            if (numbersPool.length === 0) {
                drawBtn.disabled = true;
                drawBtn.innerText = '全部抽完';
                resultDisplay.style.color = '#bdc3c7'; // 最终变灰
            } else {
                drawBtn.disabled = false;
                drawBtn.innerText = '继续抽签';
            }
        }

        // 重置功能
        function reset() {
            if (confirm('确定要重置所有抽签记录吗？')) {
                initPool();
            }
        }

        // 页面加载时初始化
        initPool();

    </script>
</body>
</html>
